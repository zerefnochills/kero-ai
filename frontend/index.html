<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KERO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Custom Electron Titlebar -->
  <div class="titlebar" id="titlebar">
    <div class="titlebar-controls">
      <button class="tb-btn tb-close" id="tbClose"></button>
      <button class="tb-btn tb-min" id="tbMin"></button>
      <button class="tb-btn tb-max" id="tbMax"></button>
    </div>
  </div>

  <div class="app-container" id="appShell">
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="app-logo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
          <span>kero-ui</span>
        </div>
      </div>
      <div class="sidebar-content">
        <button class="new-thread-btn" onclick="clearMem()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          New Thread
        </button>
      </div>
      <div class="sidebar-footer">
        <div class="status-indicator" id="backendStatus">
          <span class="dot"></span>
          <span class="text">Connecting...</span>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      
      <!-- Topbar -->
      <header class="topbar">
        <div class="topbar-left">
          <button class="icon-btn" title="Toggle Sidebar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
          </button>
          <div class="model-selector" id="modelSelector">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
            <span id="modelName">LLaMA 3</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </div>
        </div>
        <div class="topbar-right">
          <button class="icon-btn" title="Share">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
          </button>
        </div>
      </header>

      <!-- Chat Area -->
      <div class="chat-container">
        <div class="chat-scroll" id="chatArea">
          <div class="welcome-screen" id="welcomeScreen">
            <h1 class="welcome-title">Hello there!</h1>
            <p class="welcome-subtitle">How can I help you today?</p>
            
            <div class="suggestion-cards">
              <div class="suggestion-card" onclick="quickAction('Open Calculator')">
                <div class="card-title">Open Calculator</div>
                <div class="card-desc">to do some math</div>
              </div>
              <div class="suggestion-card" onclick="quickAction('Read the package.json file')">
                <div class="card-title">Read project files</div>
                <div class="card-desc">like package.json</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-container">
        <div class="input-box">
          <button class="attach-btn" title="Attach file">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          </button>
          <input 
            type="text" 
            id="chatInput" 
            placeholder="Send a message... (@ to mention, / for commands)"
            autocomplete="off"
          />
          <button class="send-btn" id="sendBtn" onclick="sendMsg()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
          </button>
        </div>
        <div class="footer-text">
          Kero can automatically open applications and read local files.
        </div>
      </div>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
